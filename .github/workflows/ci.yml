name: CI

# This project's deps.edn pins langgraph and langchain-store via
# git/sha coordinates at the top level (so a bare single-repo checkout
# CAN resolve them over the network), but langchain-store's own
# deps.edn hardcodes a `:local/root` for its langchain-clj dependency
# that only resolves inside the kotoba-lang monorepo sibling layout --
# so CI still needs the `:dev` alias (override-deps to :local/root)
# plus the sibling checkouts, same as every other cloud-itonami actor
# in this fleet (cloud-itonami-isic-0111 / cloud-itonami-isic-941 /
# cloud-itonami-iso3166-ago / cloud-itonami-isic-3512).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-8220 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (governor · governor-contract · phase · advisor · store contract)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8220
        run: clojure -M:dev:test
      - name: demo runner (compiled StateGraph, end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8220
        run: clojure -M:dev:run
